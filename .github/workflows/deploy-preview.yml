name: Deploy (preview PR)
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview # remove this line if you are NOT using Environment secrets
    steps:
      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PREVIEW_SSH_PORT }}" "${{ secrets.PREVIEW_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PREVIEW_SSH_PRIVATE_KEY }}

      - name: Build & restart preview on server
        env:
          HOST: ${{ secrets.PREVIEW_DEPLOY_HOST }}
          PORT: ${{ secrets.PREVIEW_SSH_PORT }}
          USER: ${{ secrets.PREVIEW_DEPLOY_USER }}
          APP_DIR: ${{ secrets.PREVIEW_APP_DIR }}
          REPO: https://github.com/bobfridley/summit-care
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ssh -p "$PORT" "$USER@$HOST" "
            set -e
            sudo -iu summitcare bash -lc '
              command -v pnpm >/dev/null 2>&1 || (command -v corepack >/dev/null 2>&1 || /usr/local/bin/corepack enable || true; corepack enable && corepack prepare pnpm@10.20.0 --activate)

              mkdir -p \"$APP_DIR\"
              cd \"$APP_DIR\"

              if [ -d .git ]; then
                git fetch --all --prune
              else
                git clone \"$REPO\" .
              fi

              # Checkout PR head locally as pr-<number>
              git fetch origin pull/$PR_NUMBER/head:pr-$PR_NUMBER || true
              git checkout pr-$PR_NUMBER
              git reset --hard pr-$PR_NUMBER
              git clean -fd

              pnpm install --frozen-lockfile || pnpm install
              pnpm ignored-builds || true

              BASE_PATH=\"/summit-care-preview\" NEXT_PUBLIC_BASE_PATH=\"/summit-care-preview\" NODE_ENV=\"production\" pnpm run build

              rm -rf .next-preview-previous
              [ -d .next-preview ] && mv .next-preview .next-preview-previous || true
              mv .next .next-preview

              pm2 restart summitcare-preview || pm2 start /opt/summitcare/ecosystem.config.cjs --only summitcare-preview
              pm2 save || true
            '
          "
