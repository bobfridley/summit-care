name: Deploy (prod)
on:
  push: { branches: [main] }
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Trigger server deploy (prod)
        env:
          HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PORT: ${{ secrets.PROD_SSH_PORT }}
          USER: ${{ secrets.PROD_DEPLOY_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          ssh -p "$PORT" "$USER@$HOST" \
            "sudo -iu summitcare bash -lc 'APP_DIR=\"${APP_DIR}\" /opt/summitcare/deploy.sh'"
