name: Deploy (staging)
on:
  workflow_dispatch:
  # optional:
  # push: { branches: [ staging ] }

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Trigger server deploy (staging)
        env:
          HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          PORT: ${{ secrets.STAGING_SSH_PORT }}
          USER: ${{ secrets.STAGING_DEPLOY_USER }}
          APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          ssh -p "$PORT" "$USER@$HOST" \
            "sudo -iu summitcare bash -lc 'APP_DIR=\"${APP_DIR}\" /opt/summitcare/deploy.sh'"
